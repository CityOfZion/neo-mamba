[project]
name = "neo-cpm"
description = "Platform-specific CPM binary"
version = "1.1.3"
requires-python = ">= 3.13.0,< 3.15"
license = 'MIT'
license-files = ["LICENSE.md"]
keywords = ["NEO3", "blockchain", "CPM"]
authors = [
    { name = "Erik van den Brink", email = "erik@coz.io" },
]
maintainers = [
    { name = "Erik van den Brink", email = "erik@coz.io" },
]
readme = {text = "Platform-specific CPM binary distribution for neo-mamba.", content-type = "text/markdown"}

[project.optional-dependencies]
dev = [
   "build==1.0.3",
   "requests",
   "twine",
   "wheel"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["neo_cpm*"]

[tool.setuptools.package-data]
neo_cpm = ["bin/cpm*", "py.typed"]

[tool.cpm]
tag = "v1.1.3"
